name: karaja_attendance
description: Karaja Island Field Attendance System — Employee Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.0

  # Location / GPS
  geolocator: ^11.0.0

  # Device info (device binding)
  device_info_plus: ^9.1.1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Background tasks (periodic ping)
  workmanager: ^0.5.2

  # Local notifications
  flutter_local_notifications: ^17.0.0

  # State management (lightweight)
  provider: ^6.1.1

  # Arabic font support
  google_fonts: ^6.1.0

  # Map (optional embedded mini-map)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
