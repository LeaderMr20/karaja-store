name: 🚀 Deploy to InfinityFree

# يعمل تلقائياً عند كل push على الفرع الرئيسي
# أو يدوياً من تبويب Actions في GitHub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      # ── 1. تحميل الكود ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. إنشاء api/config.php من الـ Secrets ──────────────────────────────
      - name: Generate api/config.php
        env:
          DB_HOST:    ${{ secrets.DB_HOST }}
          DB_NAME:    ${{ secrets.DB_NAME }}
          DB_USER:    ${{ secrets.DB_USER }}
          DB_PASS:    ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cat > api/config.php << 'PHPEOF'
          <?php
          /**
           * Karaja Island — API Configuration
           * Auto-generated by GitHub Actions — DO NOT edit manually
           */
          PHPEOF

          {
            echo "<?php"
            echo "/**"
            echo " * Karaja Island — API Configuration"
            echo " * Auto-generated by GitHub Actions — DO NOT edit manually"
            echo " */"
            echo "define('DB_HOST',    '${DB_HOST}');"
            echo "define('DB_NAME',    '${DB_NAME}');"
            echo "define('DB_USER',    '${DB_USER}');"
            echo "define('DB_PASS',    '${DB_PASS}');"
            echo "define('JWT_SECRET', '${JWT_SECRET}');"
            echo "define('JWT_EXPIRE', 86400 * 7);"
            echo "define('APP_TZ', 'Asia/Riyadh');"
            echo "date_default_timezone_set(APP_TZ);"
          } > api/config.php

          echo "✅ api/config.php generated successfully"
          echo "   DB_HOST = ${DB_HOST}"
          echo "   DB_NAME = ${DB_NAME}"

      # ── 3. رفع الملفات عبر FTP ──────────────────────────────────────────────
      - name: Deploy via FTP to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          # الملفات التي لا تُرفع إلى الاستضافة
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/backend/**
            **/flutter_app/**
            **/.claude/**
            **/database/**
            **/*.md
            **/*.log
            **/*.tmp
            **/*.bak
